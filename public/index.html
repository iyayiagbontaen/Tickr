<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Tickr - Daily Stock Dashboard</title>
    <link rel="stylesheet" href="styles.css">
  </head>
  <body>
    <header class="topbar">
      <div class="topbar-inner">
        <div class="brand">
          <span class="brand-mark">T</span>
          <span class="brand-name">Tickr</span>
        </div>

        <form id="add-form" class="add-form" autocomplete="off">
          <input
            id="ticker-input"
            name="ticker"
            type="text"
            placeholder="Add ticker (e.g. MSFT)"
            maxlength="10"
            spellcheck="false"
            aria-label="Add a ticker">
          <button type="submit">Add</button>
        </form>

        <button id="refresh-all" class="refresh-btn" type="button" title="Refresh all cards">
          Refresh all
        </button>
        <button id="theme-toggle" class="icon-btn" type="button" title="Toggle dark mode" aria-label="Toggle dark mode">
          <span class="theme-icon">🌙</span>
        </button>
      </div>
      <div id="status-line" class="status-line" aria-live="polite"></div>
    </header>

    <main class="dashboard">
      <div id="heatmap" class="heatmap" hidden aria-label="Watchlist heatmap"></div>

      <section id="market-pulse" class="market-pulse" data-state="idle" hidden>
        <div class="pulse-header">
          <div class="pulse-title">
            <span class="pulse-eyebrow">Market Pulse</span>
            <span class="pulse-mood-badge" data-mood="neutral">--</span>
          </div>
          <button id="pulse-refresh" class="pulse-refresh" type="button" title="Re-synthesize pulse">↻</button>
        </div>
        <p class="pulse-summary">
          <span class="skeleton-line"></span>
          <span class="skeleton-line"></span>
          <span class="skeleton-line short"></span>
        </p>
        <div class="pulse-themes" aria-label="Trending themes"></div>
        <p class="pulse-notable"></p>
        <p class="pulse-footer-text"></p>
      </section>

      <div id="empty-state" class="empty-state" hidden>
        <h2>No tickers yet</h2>
        <p>Add one to get started:</p>
        <div class="starter-chips">
          <button class="starter-chip" data-ticker="AAPL" type="button">AAPL</button>
          <button class="starter-chip" data-ticker="NVDA" type="button">NVDA</button>
          <button class="starter-chip" data-ticker="TSLA" type="button">TSLA</button>
          <button class="starter-chip" data-ticker="MSFT" type="button">MSFT</button>
          <button class="starter-chip" data-ticker="GOOGL" type="button">GOOGL</button>
          <button class="starter-chip" data-ticker="AMZN" type="button">AMZN</button>
          <button class="starter-chip" data-ticker="META" type="button">META</button>
        </div>
        <p class="empty-hint">Or type any ticker symbol above and press Add.</p>
      </div>

      <div id="cards" class="cards-grid"></div>
    </main>

    <footer class="footer">
      <p>
        Data sources: Finnhub (price), NewsAPI (headlines), Reddit r/wallstreetbets+stocks+investing,
        Gemini (sentiment). Cached for 10 minutes per ticker. Not financial advice.
      </p>
    </footer>

    <!-- Card template, cloned for each ticker -->
    <template id="card-template">
      <article class="card" data-state="loading">
        <header class="card-header">
          <div class="card-title">
            <div class="logo-wrap">
              <img class="company-logo" alt="" loading="lazy">
              <span class="logo-fallback"></span>
            </div>
            <div class="title-text">
              <span class="ticker"></span>
              <span class="company-name skeleton-line"></span>
            </div>
          </div>
          <button class="remove-btn" type="button" aria-label="Remove ticker" title="Remove">×</button>
        </header>

        <div class="price-row">
          <div class="price-block">
            <span class="price skeleton-line"></span>
            <span class="price-change skeleton-line"></span>
          </div>
          <svg class="sparkline" viewBox="0 0 120 36" preserveAspectRatio="none" aria-hidden="true">
            <path class="sparkline-area" d=""></path>
            <path class="sparkline-line" d=""></path>
          </svg>
        </div>

        <div class="sentiment-row">
          <div class="sentiment-gauge" aria-hidden="true">
            <svg viewBox="0 0 100 60">
              <path class="gauge-track" d="M 10 50 A 40 40 0 0 1 90 50" />
              <path class="gauge-fill"  d="M 10 50 A 40 40 0 0 1 90 50" />
              <line class="gauge-needle" x1="50" y1="50" x2="50" y2="14" />
              <circle class="gauge-pivot" cx="50" cy="50" r="3" />
            </svg>
          </div>
          <div class="sentiment-text">
            <span class="sentiment-badge">--</span>
            <span class="sentiment-score"></span>
          </div>
          <button class="card-refresh" type="button" title="Refresh this card">↻</button>
        </div>

        <p class="ai-summary"><span class="skeleton-line"></span><span class="skeleton-line"></span><span class="skeleton-line short"></span></p>

        <div class="card-section">
          <h3>Top headlines</h3>
          <ul class="headlines-list">
            <li class="skeleton-line"></li>
            <li class="skeleton-line"></li>
          </ul>
        </div>

        <div class="card-section">
          <h3>From Reddit</h3>
          <ul class="reddit-list">
            <li class="skeleton-line"></li>
          </ul>
        </div>

        <div class="card-section ask-section">
          <h3>Ask Tickr</h3>
          <div class="ask-history" role="log" aria-live="polite"></div>
          <form class="ask-form" autocomplete="off">
            <input class="ask-input" type="text" placeholder="Why is it moving today?" maxlength="500" aria-label="Ask a question about this ticker">
            <button class="ask-submit" type="submit" aria-label="Send question">↑</button>
          </form>
        </div>

        <p class="card-footer-text"></p>
      </article>
    </template>

    <script src="app.js"></script>
  </body>
</html>
